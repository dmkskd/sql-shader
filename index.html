<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DuckDB Live Shader Editor</title>
    <!-- This script enables SharedArrayBuffer, which is required for DuckDB-WASM. It must be served from the same origin. -->
    <script src="coi-serviceworker.js"></script>
    <!-- CodeMirror for syntax highlighting (from CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>

    <style>
      body { font-family: sans-serif; margin: 0; background-color: #222; color: #eee; }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
        background-color: #1a1a1a;
        border-bottom: 1px solid #444;
        font-size: 1.2em;
        font-weight: bold;
        flex-shrink: 0; /* Prevent header from shrinking */
      }
      header #version-span {
        font-size: 0.7em;
        color: #999;
        font-weight: normal;
        margin-left: 8px;
      }
      .engine-selector {
        font-size: 0.8em;
        font-weight: normal;
      }
      .engine-selector label {
        color: #aaa;
        margin-right: 8px;
      }
      .engine-selector select {
        padding: 4px;
        border-radius: 3px;
      }
      .main-container { display: flex; flex-direction: column; height: 100vh; }
      .editor-pane {
        display: grid;
        grid-template-columns: 640px 6px 1fr; /* canvas | handle | editor */
        flex-grow: 1;
        overflow: hidden; /* Prevent content from overflowing */
      }
      /* When the editor is hidden, the canvas column takes up all the space */
      .editor-pane.editor-hidden {
        grid-template-columns: 1fr;
      }
      /* Hide the handle and right pane when the parent has the .editor-hidden class */
      .editor-pane.editor-hidden #resize-handle,
      .editor-pane.editor-hidden .right-pane {
        display: none;
      }
      .right-pane {
        display: flex; flex-direction: column; flex: 1; min-width: 0;
        /* Make this container scroll, not CodeMirror itself */
        overflow-y: auto;
      }
      #resize-handle {
        width: 6px;
        background-color: #444;
        cursor: col-resize;
        user-select: none; /* Prevent text selection during drag */
      }
      #shader-canvas {
        background-color: black;
        width: 100%; /* Fill the grid cell width */
        aspect-ratio: 640 / 480; /* Maintain aspect ratio based on height */
        /* The canvas will now fill the 640px width and its height will adjust based on aspect-ratio */
        /* This ensures the editor always has space */
        image-rendering: pixelated; /* For crisp pixels when resizing */
      }
      /* CodeMirror styling */
      .CodeMirror {
        flex-grow: 1; /* Allow editor to take up available space */
        /* Let the editor grow to its full content height */
        height: auto;
        font-family: monospace;
        font-size: 14px;
      }
      #error-panel {
        padding: 10px;
        flex-shrink: 0; /* Prevent the error panel from shrinking away */
        font-family: monospace;
        white-space: pre-wrap; /* Wrap long error messages */
        max-height: 150px; /* Prevent it from taking too much space */
        overflow-y: auto;
      }
      #error-panel.error {
        background-color: #5c2828; /* Dark red for errors */
        color: #ffc2c2;
      }
      #error-panel.success {
        background-color: #2a4a3a;
        color: #b3ffb3;
      }
      #stats-panel {
        flex-shrink: 0;
        padding: 10px;
        background-color: #333;
        font-family: monospace;
        white-space: pre;
      }
      #controls-bar {
        padding: 8px 15px;
        background-color: #282828;
        border-top: 1px solid #444;
        flex-shrink: 0;
      }
      #controls-bar button {
        padding: 5px 12px;
        margin-right: 10px;
        background-color: #555;
        color: #eee;
        border: 1px solid #666;
        cursor: pointer;
        font-size: 0.9em;
        border-radius: 3px;
        transition: transform 0.05s ease-in-out;
      }
      #controls-bar button:active {
        transform: translateY(1px); /* Give a "pressed" effect */
        background-color: #4a4a4a; /* Slightly darken the button */
      }
      #controls-bar select {
        padding: 5px;
        background-color: #555;
        color: #eee;
      }

      /* Modal styles for the profiler */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .modal-content {
        background-color: #333;
        padding: 20px;
        border-radius: 5px;
        width: 90%;
        height: 90%;
        overflow: auto;
        position: relative;
      }
      .modal-close-button {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 2em;
        cursor: pointer;
      }
      .profile-summary {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #555;
        font-size: 0.9em;
        display: flex;
        gap: 20px;
      }
      .profile-summary span {
        color: #ccc;
      }
      .profile-summary strong {
        color: #fff;
      }
      #profile-container pre {
        white-space: pre; /* Preserve formatting from EXPLAIN ANALYZE */
        font-size: 12px; /* Make text a bit smaller to fit more */
      }
      /* Color coding for profiler timings */
      .time-hot {
        color: #ff8080; /* Red for slow */
        font-weight: bold;
      }
      .time-warm {
        color: #ffc980; /* Orange for medium */
      }
      .time-good {
        color: #80ff80; /* Green for fast/unconcerning */
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <header>
        <span>DuckDB Live Shader <span id="version-span"></span></span>
        <div class="engine-selector">
          <label for="engine-select">Engine:</label>
          <select id="engine-select">
            <option value="duckdb_wasm" selected>DuckDB WASM</option>
            <option value="clickhouse">ClickHouse</option>
          </select>
        </div>
      </header>
      <div class="editor-pane">
        <canvas id="shader-canvas" width="640" height="480"></canvas>
        <div id="resize-handle"></div>
        <div class="right-pane">
          <textarea id="sql-editor" spellcheck="false"></textarea>
          <div id="error-panel"></div>
        </div>
      </div>
      <div id="controls-bar">
        <button id="play-toggle-button">❚❚ Stop</button>
        <button id="restart-button">↺ Restart</button>
        <button id="profile-button" title="Run the query once and log detailed performance profile to the console">Profile</button>
        <select id="shader-select"></select>
        <select id="resolution-select"></select>
        <select id="zoom-select"></select>
        <button id="toggle-editor-button">Toggle Editor</button>
      </div>
      <div id="stats-panel">Initializing...</div>
    </div>
    <div id="profile-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <span class="modal-close-button" title="Close">&times;</span>
        <h2>Query Profile</h2>
        <!-- The query plan will be inserted here -->
        <div id="profile-container"></div>
      </div>
    </div>
    <!-- 
      An import map allows us to use "bare" module specifiers like in Node.js.
      This is the modern way to resolve modules in the browser.
    -->
    <script type="importmap">
      {
        "imports": {
          "@duckdb/duckdb-wasm": "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@latest/+esm",
          "@apache/arrow": "https://cdn.jsdelivr.net/npm/apache-arrow@latest/+esm",
          "@clickhouse/client-web": "https://cdn.jsdelivr.net/npm/@clickhouse/client-web@latest/+esm"
        }
      }
    </script>
    <!-- Load the main application logic from an external file -->
    <script type="module" src="main.js"></script>
  </body>
</html>
