<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ClickHouse Data Format Test</title>
    <style>
      body { font-family: sans-serif; margin: 0; background-color: #222; color: #eee; padding: 20px; }
      h1 { color: #ffc980; }
      #results { display: flex; flex-direction: column; gap: 8px; font-family: monospace; font-size: 14px; }
      .test-case { padding: 10px; border-radius: 3px; border-left: 4px solid; }
      .pass { background-color: #2a4a3a; border-color: #80ff80; }
      .fail { background-color: #5c2828; border-color: #ff8080; }
      .info { background-color: #333; border-color: #80bfff; }
      .summary { background-color: #1a1a1a; border-color: #ffc980; margin-top: 20px; padding: 15px; }
      .summary h2 { margin-top: 0; }
      table { border-collapse: collapse; width: 100%; margin-top: 10px; }
      th, td { border: 1px solid #555; padding: 8px; text-align: left; }
      th { background-color: #333; }
    </style>
  </head>
  <body>
    <h1>ClickHouse Data Format Performance Test</h1>
    <p>This page automatically tests different methods for fetching data from ClickHouse to find the fastest and most reliable option.</p>
    <div id="results">
      <div class="info">Running tests...</div>
    </div>
    <div id="summary" class="summary" style="display: none;">
      <h2>Performance Summary</h2>
      <table id="summary-table">
        <thead>
          <tr>
            <th>Strategy</th>
            <th>Status</th>
            <th>Time (ms)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@clickhouse/client-web": "https://cdn.jsdelivr.net/npm/@clickhouse/client-web@latest/+esm",
          "@apache/arrow": "https://cdn.jsdelivr.net/npm/apache-arrow@latest/+esm"
        }
      }
    </script>
    <script type="module" src="test_clickhouse_formats2.js"></script>
  </body>
</html>
